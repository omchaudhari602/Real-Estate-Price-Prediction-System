global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
