groups:
  - name: houseprice.rules
    rules:
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[2m]) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"

      - alert: HighMemoryUsage
        expr: ((process_resident_memory_bytes) / 1e9) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(app_request_latency_seconds_bucket[5m])) by (le)) > 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High API request latency (p95 > 1s)"

      - alert: HighPredictionLatency
        expr: histogram_quantile(0.95, sum(rate(prediction_latency_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High prediction latency (p95 > 2s)"

      - alert: HighErrorRate
        expr: increase(app_requests_failed_total[5m]) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Spike in failed requests"
